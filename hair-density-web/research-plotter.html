<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科研图表工具</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dbe5ef;
      --text: #132238;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --danger: #d92d20;
      --radius: 8px;
      --shadow: 0 16px 40px rgba(25, 45, 77, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
    }
    button.active, button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .app {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }
    .eyebrow {
      margin: 0 0 6px;
      color: #08765d;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }
    h2 {
      margin: 0;
      font-size: 20px;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .actions, .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .metric-nav, .chart-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .metric-nav button, .chart-tabs button {
      min-width: 98px;
      background: #fff;
    }
    .metric-nav button.active, .chart-tabs button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .data-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--muted);
    }
    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      background: #fbfdff;
      line-height: 1.55;
      tab-size: 2;
    }
    .chart-header, .table-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .chart-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 560px;
      touch-action: none;
    }
    .tooltip {
      position: absolute;
      z-index: 5;
      min-width: 160px;
      max-width: 260px;
      transform: translate(12px, 12px);
      pointer-events: none;
      background: rgba(15, 23, 42, .92);
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }
    .control-panel {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .control-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      background: #f8fbff;
    }
    .control-scroll {
      max-height: 560px;
      overflow: auto;
      padding: 16px;
    }
    .control-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
    }
    .control-section {
      grid-column: 1 / -1;
      margin-top: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      font-weight: 800;
      color: #17466d;
    }
    .field {
      display: grid;
      gap: 6px;
      color: #45627f;
      font-size: 13px;
    }
    .field.wide { grid-column: span 2; }
    .field input, .field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }
    .field input[type="checkbox"] {
      width: 22px;
      min-height: 22px;
      padding: 0;
    }
    .field input[type="color"] {
      padding: 3px;
    }
    .annotation-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .annotation-card {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
    }
    .annotation-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
      color: #17466d;
    }
    .annotation-title button {
      padding: 6px 10px;
    }
    .hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }
    .tables {
      display: grid;
      gap: 18px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    thead th {
      background: #eef5fb;
      color: #17466d;
      font-weight: 800;
    }
    .p-none { background: #fbd5d0; }
    .p-sig { background: #fff3bf; }
    .p-high { background: #dbeafe; }
    .p-vhigh { background: #d1fae5; }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 980px) {
      .topbar, .chart-header, .table-header { display: grid; }
      .actions, .row-actions { justify-content: flex-start; }
      .data-grid, .control-grid, .annotation-card { grid-template-columns: 1fr; }
      .field.wide { grid-column: auto; }
      canvas { height: 470px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Research Plotter</p>
        <h1>PRP / PRP+BTX-A 科研图表工具</h1>
      </div>
      <div class="actions">
        <button id="loadExample" type="button">载入示例</button>
        <button id="clearData" type="button">清空数据</button>
        <button id="exportCsv" type="button">导出 CSV</button>
        <button id="exportPng" type="button" class="primary">导出 300DPI PNG</button>
        <button id="exportSvg" type="button">导出 SVG</button>
      </div>
    </header>

    <nav id="metricNav" class="metric-nav" aria-label="指标切换"></nav>

    <section class="panel">
      <div class="data-grid">
        <div>
          <div class="data-head">
            <h2>PRP 原始数据</h2>
            <span id="prpStatus">0 行</span>
          </div>
          <textarea id="prpInput" spellcheck="false"></textarea>
        </div>
        <div>
          <div class="data-head">
            <h2>PRP+BTX-A 原始数据</h2>
            <span id="expStatus">0 行</span>
          </div>
          <textarea id="expInput" spellcheck="false"></textarea>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="chart-header">
        <div>
          <h2 id="chartHeading">曲线图</h2>
          <p id="chartSubtitle" class="subtitle">等待输入数据</p>
        </div>
        <div class="row-actions">
          <button id="saveEffect" type="button">保存当前效果</button>
          <button id="resetEffect" type="button">重置到保存效果</button>
          <button id="lockLayout" type="button" class="active">锁定</button>
          <button id="unlockLayout" type="button">可移动</button>
        </div>
      </div>
      <div class="chart-tabs">
        <button id="lineTab" type="button" class="active">曲线图</button>
        <button id="barTab" type="button">柱状图</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart" width="1100" height="560"></canvas>
        <div id="tooltip" class="tooltip" hidden></div>
      </div>
      <section class="control-panel">
        <div class="control-title">
          <span id="controlTitle">曲线图控制面板</span>
          <span class="status" id="controlStatus"></span>
        </div>
        <div class="control-scroll">
          <div id="controls" class="control-grid"></div>
        </div>
      </section>
    </section>

    <section class="panel tables">
      <div>
        <div class="table-header">
          <div>
            <h2>当前数据表</h2>
            <p class="subtitle">均值与误差随当前误差类型实时变化</p>
          </div>
          <button id="copySummary" type="button">复制当前数据表</button>
        </div>
        <div id="summaryTable" class="table-wrap"></div>
      </div>
      <div>
        <div class="table-header">
          <div>
            <h2>P 值矩阵</h2>
            <p class="subtitle">同组跨时间使用配对 t 检验；不同组之间使用双侧 Welch t 检验，重复比较留空</p>
          </div>
          <button id="copyPValues" type="button">复制 P 值表</button>
        </div>
        <div id="pValueTable" class="table-wrap"></div>
      </div>
    </section>
  </main>

    function checkField(label, path) {
      return `<label class="field"><span>${label}</span><input data-path="${path}" data-type="checkbox" type="checkbox" /></label>`;
    }

    function selectField(label, path, options) {
      return `<label class="field"><span>${label}</span><select data-path="${path}" data-type="select">${options.map(([v, t]) => `<option value="${v}">${t}</option>`).join("")}</select></label>`;
    }

    function lineTypes() {
      return [["solid", "实线"], ["dash", "虚线"], ["dot", "点线"], ["dashdot", "点划线"]];
    }

    function markerTypes() {
      return [["circle", "圆形"], ["square", "方形"], ["diamond", "菱形"], ["triangle", "三角形"], ["none", "无标记"]];
    }

    function annotationControls(style) {
      const annotations = style.annotations || [];
      const rows = annotations.length ? annotations.map((annotation, index) => `
        <div class="annotation-card">
          <div class="annotation-title">
            <span>标记 ${index + 1}</span>
            <button type="button" data-action="removeAnnotation" data-index="${index}">删除</button>
          </div>
          ${checkField("显示", `annotations.${index}.visible`)}
          ${field("字符", `annotations.${index}.text`, "text")}
          ${numField("X轴位置", `annotations.${index}.x`, -10, 20, 0.1)}
          ${numField("Y轴数值", `annotations.${index}.y`, -100000, 100000, 0.1)}
          ${numField("字号", `annotations.${index}.size`, 8, 80, 1)}
          ${colorField("颜色", `annotations.${index}.color`)}
        </div>
      `).join("") : `<p class="hint">点击“添加标记”后，可以输入 *、#、ns 或任意字符，并用 X轴位置 / Y轴数值控制它在图上的位置。</p>`;
      return `
        ${section("显著性标记")}
        <div class="annotation-actions">
          <button type="button" data-action="addAnnotation">添加标记</button>
          <button type="button" data-action="clearAnnotations">清空标记</button>
        </div>
        ${rows}
      `;
    }

    function updateControl(path, raw, type) {
      const style = activeStyle();
      let value = raw;
      if (type === "checkbox") value = Boolean(raw);
      if (type === "number") value = Number(raw);
      setByPath(style, path, value);
      if (path === "theme") {
        applyTheme(style, value);
        renderControls();
      }
      if (path === "legendPosition") {
        applyLegendPreset(style, value);
        renderControls();
      }
      if (path.endsWith(".color")) {
        if (path === "prp.color") style.prpErrorColor = value;
        if (path === "exp.color") style.expErrorColor = value;
      }
      updateAll();
      persist();
    }

    function addAnnotation() {
      const style = activeStyle();
      style.annotations = style.annotations || [];
      style.annotations.push({
        visible: true,
        text: "*",
        x: 2.5,
        y: Number(style.yMin) + (Number(style.yMax) - Number(style.yMin)) * 0.82,
        size: 28,
        color: style.textColor || "#111827",
      });
      renderControls();
      updateAll();
      persist();
    }

    function removeAnnotation(index) {
      const style = activeStyle();
      style.annotations = style.annotations || [];
      style.annotations.splice(index, 1);
      renderControls();
      updateAll();
      persist();
    }

    function clearAnnotations() {
      activeStyle().annotations = [];
      renderControls();
      updateAll();
      persist();
    }

    function getByPath(obj, path) {
      return path.split(".").reduce((acc, key) => acc && acc[key], obj);
    }

    function setByPath(obj, path, value) {
      const parts = path.split(".");
      let target = obj;
      while (parts.length > 1) target = target[parts.shift()];
      target[parts[0]] = value;
    }

    function applyTheme(style, theme) {
      const themes = {
        sci: { chartBg: "#ffffff", plotBg: "#ffffff", textColor: "#111827", axisColor: "#111827", font: "Arial" },
        dark: { chartBg: "#111827", plotBg: "#182235", textColor: "#f8fafc", axisColor: "#e5e7eb", font: "Arial" },
        warm: { chartBg: "#fff8ea", plotBg: "#fffdf6", textColor: "#1f2937", axisColor: "#6b5e45", font: "Arial" },
        contrast: { chartBg: "#ffffff", plotBg: "#ffffff", textColor: "#000000", axisColor: "#000000", font: "Arial" },
      };
      Object.assign(style, themes[theme] || themes.sci);
      style.theme = theme;
    }

    function applyLegendPreset(style, preset) {
      if (preset === "custom") return;
      const w = els.chart.clientWidth || 1100;
      const h = els.chart.clientHeight || 560;
      const xCenter = style.plotLeft + (w - style.plotLeft - style.plotRight) / 2 - 95;
      const xRight = w - style.plotRight - 190;
      const yBottom = h - style.plotBottom + 36;
      const map = {
        leftTop: [style.plotLeft + 18, style.plotTop + 18],
        rightTop: [xRight, style.plotTop + 18],
        leftBottom: [style.plotLeft + 18, yBottom],
        rightBottom: [xRight, yBottom],
        topCenter: [xCenter, style.plotTop - 42],
        bottomCenter: [xCenter, yBottom],
      };
      if (map[preset]) {
        style.legendX = Math.round(map[preset][0]);
        style.legendY = Math.round(map[preset][1]);
      }
    }

    function parseInput(text) {
      const rows = [];
      text.split(/\r?\n/).forEach((line, index) => {
        const tokens = line.trim().split(/[\t,，;；\s]+/).filter(Boolean);
        const nums = tokens.filter((token) => /^[-+]?(?:\d+\.?\d*|\.\d+)(?:e[-+]?\d+)?$/i.test(token)).map(Number);
        if (nums.length < 4) return;
        let vals;
        if (nums.length >= 7) vals = nums.slice(-6);
        else if (nums.length === 5) vals = nums.slice(-4);
        else if (nums.length >= 6) vals = nums.slice(-6);
        else vals = nums.slice(-4);
        if (vals.length >= 6) vals = [vals[0], vals[2], vals[4], vals[5]];
        else vals = vals.slice(-4);
        if (vals.length === 4 && vals.every(Number.isFinite)) {
          rows.push({ id: "R" + (index + 1), values: vals });
        }
      });
      return rows;
    }

    function getData() {
      return {
        prp: parseInput(els.prpInput.value),
        exp: parseInput(els.expInput.value),
      };
    }

    function rowsFor(rows, style) {
      return rows.map((row) => {
        if (!style.normalize) return row.values.slice();
        const base = row.values[0];
        if (!Number.isFinite(base) || base === 0) return row.values.slice();
        return row.values.map((v) => v / base * 100);
      });
    }

    function getStats(data, style) {
      const prpRows = rowsFor(data.prp, style);
      const expRows = rowsFor(data.exp, style);
      return TIMES.map((time, idx) => {
        const prpValues = prpRows.map((r) => r[idx]).filter(Number.isFinite);
        const expValues = expRows.map((r) => r[idx]).filter(Number.isFinite);
        return {
          time,
          prp: describe(prpValues, style.errorType),
          exp: describe(expValues, style.errorType),
          prpValues,
          expValues,
        };
      });
    }

    function describe(values, errorType) {
      const n = values.length;
      const meanValue = mean(values);
      const sdValue = sd(values);
      const semValue = n > 0 ? sdValue / Math.sqrt(n) : NaN;
      const error = errorType === "sem" ? semValue : errorType === "ci" ? 1.96 * semValue : sdValue;
      return { n, mean: meanValue, sd: sdValue, sem: semValue, ci: 1.96 * semValue, error };
    }

    function mean(values) {
      if (!values.length) return NaN;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function variance(values) {
      if (values.length < 2) return NaN;
      const m = mean(values);
      return values.reduce((sum, value) => sum + (value - m) ** 2, 0) / (values.length - 1);
    }

    function sd(values) {
      const v = variance(values);
      return Number.isFinite(v) ? Math.sqrt(v) : NaN;
    }

    function updateAll() {
      saveCurrentText();
      const data = getData();
      const style = activeStyle();
      const stats = getStats(data, style);
      els.prpStatus.textContent = data.prp.length + " 行";
      els.expStatus.textContent = data.exp.length + " 行";
      els.chartSubtitle.textContent = `PRP ${data.prp.length} 行，PRP+BTX-A ${data.exp.length} 行`;
      draw();
      renderSummary(stats);
      renderPValues(stats, data, style);
      persist();
    }

    function draw(targetCanvas = els.chart, exportSize = null, vector = false) {
      const rect = targetCanvas.getBoundingClientRect();
      const cssW = exportSize ? exportSize.width : Math.max(760, rect.width || targetCanvas.clientWidth || 1100);
      const cssH = exportSize ? exportSize.height : Math.max(460, rect.height || targetCanvas.clientHeight || 560);
      const ratio = exportSize ? 1 : Math.min(3, Math.max(2, window.devicePixelRatio || 1));
      targetCanvas.width = Math.round(cssW * ratio);
      targetCanvas.height = Math.round(cssH * ratio);
      const ctx = targetCanvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      renderCanvas(ctx, cssW, cssH, !exportSize);
    }

    function renderCanvas(ctx, width, height, interactive) {
      const style = activeStyle();
      const data = getData();
      const stats = getStats(data, style);
      const plot = makePlot(width, height, style);
      state.hovers = [];
      state.handles = [];
      ctx.save();
      ctx.fillStyle = style.chartBg;
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = style.plotBg;
      ctx.fillRect(plot.left, plot.top, plot.w, plot.h);
      drawGrid(ctx, plot, style);
      drawAxes(ctx, plot, style);
      if (state.chartType === "bar") drawBars(ctx, plot, style, stats, data);
      else drawLines(ctx, plot, style, stats, data);
      if (style.showDiff) drawDiff(ctx, plot, style, stats);
      if (style.markMax) drawMaxMarker(ctx, plot, style, stats);
      drawTitles(ctx, plot, style, width, height, interactive);
      drawAnnotations(ctx, plot, style, interactive);
      ctx.restore();
    }

    function makePlot(width, height, style) {
      const left = clamp(style.plotLeft, 20, width - 120);
      const right = clamp(style.plotRight, 20, width - left - 80);
      const top = clamp(style.plotTop, 20, height - 140);
      const bottom = clamp(style.plotBottom, 20, height - top - 80);
      const w = width - left - right;
      const h = height - top - bottom;
      const yMin = Number(style.yMin);
      const yMax = Number(style.yMax);
      const xMin = Number(style.xMin);
      const xMax = Number(style.xMax);
      return {
        left, right, top, bottom, w, h, yMin, yMax, xMin, xMax,
        x: (value) => left + (value - xMin) / (xMax - xMin) * w,
        y: (value) => top + h - (value - yMin) / (yMax - yMin) * h,
      };
    }

    function drawGrid(ctx, plot, style) {
      ctx.save();
      ctx.lineWidth = 1;
      if (style.majorGrid || style.minorGrid) {
        forEachYTick(style, (tick) => {
          const y = plot.y(tick);
          if (style.majorGrid) {
            ctx.strokeStyle = "rgba(148,163,184,0.35)";
            line(ctx, plot.left, y, plot.left + plot.w, y);
          }
          if (style.minorGrid) {
            const step = Number(style.yStep) / 2;
            const my = plot.y(tick + step);
            if (my > plot.top && my < plot.top + plot.h) {
              ctx.strokeStyle = "rgba(148,163,184,0.18)";
              line(ctx, plot.left, my, plot.left + plot.w, my);
            }
          }
        });
      }
      ctx.restore();
    }

    function drawAxes(ctx, plot, style) {
      ctx.save();
      ctx.strokeStyle = style.axisColor;
      ctx.fillStyle = style.textColor;
      ctx.lineWidth = 1.8;
      line(ctx, plot.left, plot.top, plot.left, plot.top + plot.h);
      line(ctx, plot.left, plot.top + plot.h, plot.left + plot.w, plot.top + plot.h);
      ctx.font = `${style.tickSize}px ${style.font}`;
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      const tickLen = style.tickDirection === "in" ? 7 : -7;
      forEachYTick(style, (tick) => {
        const y = plot.y(tick);
        line(ctx, plot.left, y, plot.left + tickLen, y);
        ctx.fillText(formatNumber(tick, 2), plot.left - 12, y);
      });
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      TIMES.forEach((time) => {
        const x = plot.x(time.x);
        line(ctx, x, plot.top + plot.h, x, plot.top + plot.h - tickLen);
        ctx.fillText(time.label, x, plot.top + plot.h + 12);
      });
      ctx.restore();
    }

    function forEachYTick(style, callback) {
      const step = Number(style.yStep) || 1;
      const min = Number(style.yMin);
      const max = Number(style.yMax);
      const start = Math.ceil(min / step) * step;
      for (let tick = start, guard = 0; tick <= max + step * 0.0001 && guard < 1000; tick += step, guard += 1) {
        callback(Number(tick.toFixed(10)));
      }
    }

    function drawLines(ctx, plot, style, stats, data) {
      if (style.showPoints) {
        drawRawPoints(ctx, plot, style, rowsFor(data.prp, style), "prp");
        drawRawPoints(ctx, plot, style, rowsFor(data.exp, style), "exp");
      }
      drawLineSeries(ctx, plot, style, stats, "prp");
      drawLineSeries(ctx, plot, style, stats, "exp");
    }

    function drawLineSeries(ctx, plot, style, stats, key) {
      const s = style[key];
      if (!s.visible) return;
      const points = stats.map((row) => ({ x: plot.x(row.time.x), y: plot.y(row[key].mean), row })).filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
      if (!points.length) return;
      if (style.errorVisible) drawErrorBars(ctx, plot, style, stats, key);
      ctx.save();
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.lineWidth;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      setDash(ctx, s.lineType);
      ctx.beginPath();
      if (style.smooth && points.length > 2) {
        const smooth = makeSmoothPoints(points, style.smoothness);
        smooth.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      } else {
        points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      }
      ctx.stroke();
      ctx.setLineDash([]);
      points.forEach((p) => {
        drawMarker(ctx, s.marker, p.x, p.y, s.markerSize, s.color);
        addHover(p.x, p.y, s.markerSize + 8, key === "prp" ? "PRP" : "PRP+BTX-A", p.row.time.label, p.row[key]);
        if (style.showValues) labelValue(ctx, p.x, p.y - 12, p.row[key].mean, style);
      });
      ctx.restore();
    }

    function drawBars(ctx, plot, style, stats, data) {
      const keys = ["prp", "exp"].filter((key) => style[key].visible);
      const zeroY = clamp(plot.y(0), plot.top, plot.top + plot.h);
      if (style.showPoints) {
        drawRawPoints(ctx, plot, style, rowsFor(data.prp, style), "prp", true, keys);
        drawRawPoints(ctx, plot, style, rowsFor(data.exp, style), "exp", true, keys);
      }
      keys.forEach((key, seriesIndex) => {
        const s = style[key];
        const offset = (seriesIndex - (keys.length - 1) / 2) * (style.barWidth + style.barGap);
        stats.forEach((row) => {
          const x = plot.x(row.time.x) + offset;
          const y = plot.y(row[key].mean);
          const rectY = Math.min(y, zeroY);
          const rectH = Math.abs(zeroY - y);
          ctx.save();
          ctx.globalAlpha = style.barOpacity;
          ctx.fillStyle = s.color;
          ctx.fillRect(x - style.barWidth / 2, rectY, style.barWidth, rectH);
          ctx.globalAlpha = 1;
          if (style.barBorder > 0) {
            ctx.strokeStyle = s.color;
            ctx.lineWidth = style.barBorder;
            ctx.strokeRect(x - style.barWidth / 2, rectY, style.barWidth, rectH);
          }
          ctx.restore();
          if (style.errorVisible) drawSingleError(ctx, plot, style, row, key, x);
          drawMarker(ctx, s.marker, x, y, s.markerSize, s.color);
          addHover(x, y, Math.max(style.barWidth, 18), key === "prp" ? "PRP" : "PRP+BTX-A", row.time.label, row[key]);
          if (style.showValues) labelValue(ctx, x, y - 12, row[key].mean, style);
        });
      });
    }

    function drawRawPoints(ctx, plot, style, rowValues, key, barMode = false, keys = ["prp", "exp"]) {
      const s = style[key];
      if (!s.visible) return;
      const offset = barMode ? (keys.indexOf(key) - (keys.length - 1) / 2) * (style.barWidth + style.barGap) : 0;
      ctx.save();
      ctx.globalAlpha = style.rawOpacity;
      rowValues.forEach((row, rowIndex) => {
        row.forEach((value, timeIndex) => {
          if (!Number.isFinite(value)) return;
          const time = TIMES[timeIndex];
          const jitter = (seededNoise((rowIndex + 1) * 47 + (timeIndex + 1) * 83 + (key === "prp" ? 1 : 9))) * style.rawJitter;
          const x = plot.x(time.x + jitter) + offset;
          const y = plot.y(value);
          drawMarker(ctx, s.marker === "none" ? "circle" : s.marker, x, y, Math.max(4, s.markerSize * 0.45), s.color);
        });
      });
      ctx.restore();
    }

    function drawErrorBars(ctx, plot, style, stats, key) {
      stats.forEach((row) => drawSingleError(ctx, plot, style, row, key, plot.x(row.time.x)));
    }

    function drawSingleError(ctx, plot, style, row, key, xOverride) {
      const item = row[key];
      if (!Number.isFinite(item.error)) return;
      const color = key === "prp" ? style.prpErrorColor : style.expErrorColor;
      const width = key === "prp" ? style.prpErrorWidth : style.expErrorWidth;
      const cap = key === "prp" ? style.prpCapWidth : style.expCapWidth;
      const x = xOverride;
      const y1 = plot.y(item.mean - item.error);
      const y2 = plot.y(item.mean + item.error);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      line(ctx, x, y1, x, y2);
      line(ctx, x - cap / 2, y1, x + cap / 2, y1);
      line(ctx, x - cap / 2, y2, x + cap / 2, y2);
      ctx.restore();
    }

    function drawDiff(ctx, plot, style, stats) {
      const diffs = stats.map((row) => row.exp.mean - row.prp.mean);
      if (!diffs.every(Number.isFinite)) return;
      const min = Math.min(...diffs);
      const max = Math.max(...diffs);
      const bandTop = plot.top + plot.h * 0.82;
      const bandH = plot.h * 0.14;
      const scale = (value) => bandTop + bandH - (value - min) / ((max - min) || 1) * bandH;
      ctx.save();
      ctx.strokeStyle = "#0f766e";
      ctx.fillStyle = "#0f766e";
      ctx.lineWidth = 1.8;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      diffs.forEach((value, i) => {
        const x = plot.x(TIMES[i].x);
        const y = scale(value);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = `${Math.max(10, style.tickSize - 2)}px ${style.font}`;
      ctx.textAlign = "left";
      ctx.fillText("差异趋势", plot.left + 8, bandTop - 6);
      ctx.restore();
    }

    function drawMaxMarker(ctx, plot, style, stats) {
      let best = null;
      stats.forEach((row) => {
        const diff = row.exp.mean - row.prp.mean;
        if (!Number.isFinite(diff)) return;
        if (!best || diff > best.diff) best = { row, diff };
      });
      if (!best) return;
      const x = plot.x(best.row.time.x);
      ctx.save();
      ctx.strokeStyle = "#d97706";
      ctx.fillStyle = "#d97706";
      ctx.lineWidth = 1.8;
      ctx.setLineDash([6, 6]);
      line(ctx, x, plot.top, x, plot.top + plot.h);
      ctx.setLineDash([]);
      ctx.font = `bold ${Math.max(16, style.tickSize)}px ${style.font}`;
      ctx.textAlign = "center";
      ctx.fillText("*", x, plot.top + 18);
      ctx.restore();
    }

    function drawAnnotations(ctx, plot, style, interactive) {
      const annotations = style.annotations || [];
      annotations.forEach((annotation, index) => {
        if (!annotation.visible || !String(annotation.text || "").length) return;
        const xValue = Number(annotation.x);
        const yValue = Number(annotation.y);
        if (!Number.isFinite(xValue) || !Number.isFinite(yValue)) return;
        const x = plot.x(xValue);
        const y = plot.y(yValue);
        const size = Number(annotation.size) || 24;
        ctx.save();
        ctx.fillStyle = annotation.color || style.textColor;
        ctx.font = `bold ${size}px ${style.font}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(annotation.text, x, y);
        const width = Math.max(size, ctx.measureText(annotation.text).width);
        addHandle("annotation", x - width / 2 - 8, y - size / 2 - 8, width + 16, size + 16, interactive, { index });
        ctx.restore();
      });
    }

    function drawTitles(ctx, plot, style, width, height, interactive) {
      ctx.save();
      ctx.fillStyle = style.textColor;
      if (style.showTitle && style.chartTitle) {
        ctx.font = `bold ${style.titleSize}px ${style.font}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const x = plot.left + plot.w * style.titleX / 100;
        const y = style.titleY;
        ctx.fillText(style.chartTitle, x, y);
        addHandle("title", x - 180, y - 18, 360, 36, interactive);
      }
      if (style.showXLabel && style.xLabel) {
        ctx.font = `${style.axisTitleSize}px ${style.font}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const x = plot.left + plot.w * style.xLabelX / 100;
        const y = height - style.xLabelY;
        ctx.fillText(style.xLabel, x, y);
        addHandle("xLabel", x - 130, y - 18, 260, 36, interactive);
      }
      if (style.showYLabel && style.yLabel) {
        ctx.font = `${style.axisTitleSize}px ${style.font}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const x = style.yLabelX;
        const y = plot.top + plot.h * style.yLabelY / 100;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(style.yLabel, 0, 0);
        ctx.restore();
        addHandle("yLabel", x - 22, y - 150, 44, 300, interactive);
      }
      if (style.showLegend) drawLegend(ctx, plot, style, interactive);
      ctx.restore();
    }

    function drawLegend(ctx, plot, style, interactive) {
      const items = [
        ["prp", "PRP"],
        ["exp", "PRP+BTX-A"],
      ].filter(([key]) => style[key].visible);
      if (!items.length) return;
      const x = style.legendX;
      const y = style.legendY;
      const itemW = 100;
      const boxW = Math.max(112, items.length * itemW + 14);
      const boxH = 34;
      ctx.save();
      if (style.legendBg) {
        ctx.fillStyle = style.chartBg === "#111827" ? "rgba(15,23,42,.7)" : "rgba(255,255,255,.75)";
        ctx.fillRect(x - 8, y - 18, boxW, boxH);
      }
      if (style.legendBorder) {
        ctx.strokeStyle = "rgba(100,116,139,.65)";
        ctx.strokeRect(x - 8, y - 18, boxW, boxH);
      }
      ctx.font = `${style.legendSize}px ${style.font}`;
      ctx.fillStyle = style.textColor;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      items.forEach(([key, label], i) => {
        const s = style[key];
        const ix = x + i * itemW;
        if (state.chartType === "bar") {
          ctx.fillStyle = s.color;
          ctx.fillRect(ix, y - 8, 16, 16);
        } else {
          ctx.strokeStyle = s.color;
          ctx.lineWidth = Math.max(2, s.lineWidth);
          setDash(ctx, s.lineType);
          line(ctx, ix, y, ix + 28, y);
          ctx.setLineDash([]);
          drawMarker(ctx, s.marker, ix + 14, y, s.markerSize, s.color);
        }
        ctx.fillStyle = style.textColor;
        ctx.fillText(label, ix + 36, y);
      });
      addHandle("legend", x - 10, y - 22, boxW + 8, 44, interactive);
      ctx.restore();
    }

    function addHandle(type, x, y, width, height, interactive, meta = {}) {
      if (!interactive) return;
      state.handles.push({ type, x, y, width, height, ...meta });
      if (state.unlocked) {
        const ctx = els.chart.getContext("2d");
        ctx.save();
        ctx.strokeStyle = "rgba(37,99,235,.25)";
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(x, y, width, height);
        ctx.restore();
      }
    }

    function addHover(x, y, radius, group, time, stats) {
      state.hovers.push({ x, y, radius, group, time, stats });
    }

    function line(ctx, x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function setDash(ctx, type) {
      const map = { solid: [], dash: [10, 6], dot: [2, 6], dashdot: [10, 5, 2, 5] };
      ctx.setLineDash(map[type] || []);
    }

    function drawMarker(ctx, shape, x, y, size, color) {
      if (shape === "none") return;
      const r = size / 2;
      ctx.save();
      ctx.fillStyle = color;
      ctx.beginPath();
      if (shape === "square") ctx.rect(x - r, y - r, size, size);
      else if (shape === "diamond") {
        ctx.moveTo(x, y - r);
        ctx.lineTo(x + r, y);
        ctx.lineTo(x, y + r);
        ctx.lineTo(x - r, y);
        ctx.closePath();
      } else if (shape === "triangle") {
        ctx.moveTo(x, y - r);
        ctx.lineTo(x + r, y + r);
        ctx.lineTo(x - r, y + r);
        ctx.closePath();
      } else {
        ctx.arc(x, y, r, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.restore();
    }

    function labelValue(ctx, x, y, value, style) {
      ctx.save();
      ctx.fillStyle = style.textColor;
      ctx.font = `${Math.max(10, style.tickSize - 2)}px ${style.font}`;
      ctx.textAlign = "center";
      ctx.fillText(formatNumber(value), x, y);
      ctx.restore();
    }

    function makeSmoothPoints(points, density) {
      const out = [];
      for (let i = 0; i < points.length - 1; i += 1) {
        const p0 = points[Math.max(0, i - 1)];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[Math.min(points.length - 1, i + 2)];
        for (let j = 0; j < density; j += 1) {
          const t = j / density;
          out.push({
            x: catmull(p0.x, p1.x, p2.x, p3.x, t),
            y: catmull(p0.y, p1.y, p2.y, p3.y, t),
          });
        }
      }
      out.push(points[points.length - 1]);
      return out;
    }

    function catmull(p0, p1, p2, p3, t) {
      return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t * t + (-p0 + 3 * p1 - 3 * p2 + p3) * t * t * t);
    }

    function renderSummary(stats) {
      const err = activeStyle().errorType.toUpperCase();
      const rows = stats.map((row) => `
        <tr>
          <td>${row.time.label}</td>
          <td>${row.prp.n}</td><td>${formatNumber(row.prp.mean)}</td><td>${formatNumber(row.prp.error)}</td>
          <td>${row.exp.n}</td><td>${formatNumber(row.exp.mean)}</td><td>${formatNumber(row.exp.error)}</td>
        </tr>
      `).join("");
      els.summaryTable.innerHTML = `<table><thead><tr><th>时间</th><th>PRP n</th><th>PRP 均值</th><th>PRP ${err}</th><th>PRP+BTX-A n</th><th>PRP+BTX-A 均值</th><th>PRP+BTX-A ${err}</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function pValueGroups(data, style, stats) {
      const prpRows = rowsFor(data.prp, style);
      const expRows = rowsFor(data.exp, style);
      return [
        ...stats.map((row, idx) => ({ label: "PRP " + row.time.label, arm: "prp", timeIndex: idx, values: row.prpValues, rows: prpRows })),
        ...stats.map((row, idx) => ({ label: "PRP+BTX-A " + row.time.label, arm: "exp", timeIndex: idx, values: row.expValues, rows: expRows })),
      ];
    }

    function pValueForGroups(g1, g2) {
      if (g1.arm === g2.arm && g1.timeIndex !== g2.timeIndex) {
        return pairedP(g1.rows, g1.timeIndex, g2.timeIndex);
      }
      return welchP(g1.values, g2.values);
    }

    function renderPValues(stats, data, style) {
      const groups = pValueGroups(data, style, stats);
      const head = `<tr><th>比较组</th>${groups.map((g) => `<th>${g.label}</th>`).join("")}</tr>`;
      const body = groups.map((g1, i) => {
        const cells = groups.map((g2, j) => {
          if (j <= i) return "<td></td>";
          const p = pValueForGroups(g1, g2);
          return `<td class="${pClass(p)}">${Number.isFinite(p) ? formatP(p) : ""}</td>`;
        }).join("");
        return `<tr><th>${g1.label}</th>${cells}</tr>`;
      }).join("");
      els.pValueTable.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    function pairedP(rows, idxA, idxB) {
      const diffs = rows
        .map((row) => [row[idxA], row[idxB]])
        .filter(([a, b]) => Number.isFinite(a) && Number.isFinite(b))
        .map(([a, b]) => a - b);
      if (diffs.length < 2) return NaN;
      const md = mean(diffs);
      const vd = variance(diffs);
      if (!Number.isFinite(vd)) return NaN;
      const se = Math.sqrt(vd / diffs.length);
      if (se <= 0) return Math.abs(md) < 1e-12 ? 1 : NaN;
      const t = Math.abs(md / se);
      return 2 * (1 - studentTCdf(t, diffs.length - 1));
    }

    function welchP(a, b) {
      if (a.length < 2 || b.length < 2) return NaN;
      const ma = mean(a), mb = mean(b), va = variance(a), vb = variance(b);
      if (!Number.isFinite(va) || !Number.isFinite(vb)) return NaN;
      const se2 = va / a.length + vb / b.length;
      if (se2 <= 0) return NaN;
      const t = Math.abs((ma - mb) / Math.sqrt(se2));
      const df = se2 * se2 / ((va / a.length) ** 2 / (a.length - 1) + (vb / b.length) ** 2 / (b.length - 1));
      return 2 * (1 - studentTCdf(t, df));
    }

    function studentTCdf(t, v) {
      const x = v / (v + t * t);
      const ib = betai(v / 2, 0.5, x);
      return t >= 0 ? 1 - 0.5 * ib : 0.5 * ib;
    }

    function betai(a, b, x) {
      if (x < 0 || x > 1) return NaN;
      if (x === 0 || x === 1) return x;
      const bt = Math.exp(gammaln(a + b) - gammaln(a) - gammaln(b) + a * Math.log(x) + b * Math.log(1 - x));
      if (x < (a + 1) / (a + b + 2)) return bt * betacf(a, b, x) / a;
      return 1 - bt * betacf(b, a, 1 - x) / b;
    }

    function betacf(a, b, x) {
      const maxIt = 100;
      const eps = 3e-7;
      const fpMin = 1e-30;
      let qab = a + b;
      let qap = a + 1;
      let qam = a - 1;
      let c = 1;
      let d = 1 - qab * x / qap;
      if (Math.abs(d) < fpMin) d = fpMin;
      d = 1 / d;
      let h = d;
      for (let m = 1; m <= maxIt; m += 1) {
        const m2 = 2 * m;
        let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
        d = 1 + aa * d;
        if (Math.abs(d) < fpMin) d = fpMin;
        c = 1 + aa / c;
        if (Math.abs(c) < fpMin) c = fpMin;
        d = 1 / d;
        h *= d * c;
        aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
        d = 1 + aa * d;
        if (Math.abs(d) < fpMin) d = fpMin;
        c = 1 + aa / c;
        if (Math.abs(c) < fpMin) c = fpMin;
        d = 1 / d;
        const del = d * c;
        h *= del;
        if (Math.abs(del - 1) < eps) break;
      }
      return h;
    }

    function gammaln(xx) {
      const cof = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.001208650973866179, -0.000005395239384953];
      let x = xx;
      let y = x;
      let tmp = x + 5.5;
      tmp -= (x + 0.5) * Math.log(tmp);
      let ser = 1.000000000190015;
      for (let j = 0; j < cof.length; j += 1) ser += cof[j] / ++y;
      return -tmp + Math.log(2.5066282746310005 * ser / x);
    }

    function pClass(p) {
      if (!Number.isFinite(p)) return "";
      if (p <= 0.001) return "p-vhigh";
      if (p <= 0.01) return "p-high";
      if (p <= 0.05) return "p-sig";
      return "p-none";
    }

    function formatP(p) {
      if (p < 0.0001) return "<0.0001";
      return p.toFixed(4);
    }

    function getSummaryTsv() {
      const style = activeStyle();
      const stats = getStats(getData(), style);
      const err = style.errorType.toUpperCase();
      const rows = [["时间", "PRP n", "PRP 均值", "PRP " + err, "PRP+BTX-A n", "PRP+BTX-A 均值", "PRP+BTX-A " + err]];
      stats.forEach((row) => rows.push([row.time.label, row.prp.n, formatNumber(row.prp.mean), formatNumber(row.prp.error), row.exp.n, formatNumber(row.exp.mean), formatNumber(row.exp.error)]));
      return rows.map((row) => row.join("\t")).join("\n");
    }

    function getPValueTsv() {
      const data = getData();
      const style = activeStyle();
      const stats = getStats(data, style);
      const groups = pValueGroups(data, style, stats);
      const rows = [["比较组", ...groups.map((g) => g.label)]];
      groups.forEach((g1, i) => {
        const row = [g1.label];
        groups.forEach((g2, j) => row.push(j <= i ? "" : formatP(pValueForGroups(g1, g2))));
        rows.push(row);
      });
      return rows.map((row) => row.join("\t")).join("\n");
    }

    function exportCsv() {
      const csv = getSummaryTsv().split("\n").map((line) => line.split("\t").map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
      download(new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" }), fileBase() + "_summary.csv");
    }

    function exportPng() {
      const off = document.createElement("canvas");
      draw(off, { width: 2400, height: 1500 });
      off.toBlob((blob) => download(blob, fileBase() + ".png"), "image/png");
    }

    function exportSvg() {
      const svg = makeSvg(1600, 980);
      download(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }), fileBase() + ".svg");
    }

    function makeSvg(width, height) {
      const style = activeStyle();
      const data = getData();
      const stats = getStats(data, style);
      const plot = makePlot(width, height, style);
      const parts = [];
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`);
      parts.push(`<rect width="100%" height="100%" fill="${style.chartBg}"/>`);
      parts.push(`<rect x="${plot.left}" y="${plot.top}" width="${plot.w}" height="${plot.h}" fill="${style.plotBg}"/>`);
      parts.push(`<g stroke="${style.axisColor}" fill="${style.textColor}" font-family="${esc(style.font)}">`);
      parts.push(`<line x1="${plot.left}" y1="${plot.top}" x2="${plot.left}" y2="${plot.top + plot.h}" stroke-width="1.8"/>`);
      parts.push(`<line x1="${plot.left}" y1="${plot.top + plot.h}" x2="${plot.left + plot.w}" y2="${plot.top + plot.h}" stroke-width="1.8"/>`);
      forEachYTick(style, (tick) => {
        const y = plot.y(tick);
        parts.push(`<line x1="${plot.left - 7}" y1="${y}" x2="${plot.left}" y2="${y}" stroke-width="1"/>`);
        parts.push(`<text x="${plot.left - 12}" y="${y + 5}" text-anchor="end" font-size="${style.tickSize}">${formatNumber(tick)}</text>`);
      });
      TIMES.forEach((time) => {
        const x = plot.x(time.x);
        parts.push(`<line x1="${x}" y1="${plot.top + plot.h}" x2="${x}" y2="${plot.top + plot.h + 7}" stroke-width="1"/>`);
        parts.push(`<text x="${x}" y="${plot.top + plot.h + 28}" text-anchor="middle" font-size="${style.tickSize}">${time.label}</text>`);
      });
      const visibleKeys = ["prp", "exp"].filter((key) => style[key].visible);
      if (state.chartType === "bar") {
        visibleKeys.forEach((key, seriesIndex) => {
          const offset = (seriesIndex - (visibleKeys.length - 1) / 2) * (style.barWidth + style.barGap);
          stats.forEach((row) => {
            const item = row[key];
            const x = plot.x(row.time.x) + offset - style.barWidth / 2;
            const y = plot.y(item.mean);
            const zero = plot.y(0);
            parts.push(`<rect x="${x}" y="${Math.min(y, zero)}" width="${style.barWidth}" height="${Math.abs(zero - y)}" fill="${style[key].color}" opacity="${style.barOpacity}"/>`);
          });
        });
      } else {
        visibleKeys.forEach((key) => {
          const pts = stats.map((row) => `${plot.x(row.time.x)},${plot.y(row[key].mean)}`).join(" ");
          parts.push(`<polyline points="${pts}" fill="none" stroke="${style[key].color}" stroke-width="${style[key].lineWidth}" stroke-linejoin="round" stroke-linecap="round"/>`);
          stats.forEach((row) => parts.push(svgMarker(style[key].marker, plot.x(row.time.x), plot.y(row[key].mean), style[key].markerSize, style[key].color)));
        });
      }
      if (style.showTitle && style.chartTitle) parts.push(`<text x="${plot.left + plot.w * style.titleX / 100}" y="${style.titleY}" text-anchor="middle" font-size="${style.titleSize}" font-weight="700">${esc(style.chartTitle)}</text>`);
      if (style.showXLabel && style.xLabel) parts.push(`<text x="${plot.left + plot.w * style.xLabelX / 100}" y="${height - style.xLabelY}" text-anchor="middle" font-size="${style.axisTitleSize}">${esc(style.xLabel)}</text>`);
      if (style.showYLabel && style.yLabel) {
        const x = style.yLabelX, y = plot.top + plot.h * style.yLabelY / 100;
        parts.push(`<text x="${x}" y="${y}" text-anchor="middle" font-size="${style.axisTitleSize}" transform="rotate(-90 ${x} ${y})">${esc(style.yLabel)}</text>`);
      }
      (style.annotations || []).forEach((annotation) => {
        if (!annotation.visible || !String(annotation.text || "").length) return;
        const x = plot.x(Number(annotation.x));
        const y = plot.y(Number(annotation.y));
        parts.push(`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="${Number(annotation.size) || 24}" font-weight="700" fill="${annotation.color || style.textColor}">${esc(annotation.text)}</text>`);
      });
      parts.push(`</g></svg>`);
      return parts.join("");
    }

    function svgMarker(shape, x, y, size, color) {
      const r = size / 2;
      if (shape === "none") return "";
      if (shape === "square") return `<rect x="${x - r}" y="${y - r}" width="${size}" height="${size}" fill="${color}"/>`;
      if (shape === "diamond") return `<path d="M${x},${y - r} L${x + r},${y} L${x},${y + r} L${x - r},${y} Z" fill="${color}"/>`;
      if (shape === "triangle") return `<path d="M${x},${y - r} L${x + r},${y + r} L${x - r},${y + r} Z" fill="${color}"/>`;
      return `<circle cx="${x}" cy="${y}" r="${r}" fill="${color}"/>`;
    }

    function fileBase() {
      return METRICS[state.metric].label + "_" + (state.chartType === "bar" ? "柱状图" : "曲线图");
    }

    function download(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function copyText(text, button, label) {
      let ok = false;
      try {
        await navigator.clipboard.writeText(text);
        ok = true;
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        ok = document.execCommand("copy");
        ta.remove();
      }
      if (ok) {
        const old = button.textContent;
        button.textContent = label;
        setTimeout(() => button.textContent = old, 1200);
      }
    }

    function setLayoutUnlocked(value) {
      state.unlocked = value;
      els.lockLayout.classList.toggle("active", !value);
      els.unlockLayout.classList.toggle("active", value);
      els.controlStatus.textContent = value ? "标题、轴标题、图例可拖拽" : "布局已锁定";
      draw();
    }

    function saveEffect() {
      const item = currentMetricState();
      item.saved[state.chartType] = clone(activeStyle());
      persist();
      els.controlStatus.textContent = "当前效果已保存";
    }

    function resetEffect() {
      const item = currentMetricState();
      if (item.saved[state.chartType]) {
        item[state.chartType] = clone(item.saved[state.chartType]);
      } else {
        item[state.chartType] = defaultStyle(state.metric, state.chartType);
      }
      renderControls();
      updateAll();
    }

    function formatNumber(value, digits = 1) {
      if (!Number.isFinite(Number(value))) return "";
      return Number(value).toFixed(digits).replace(/\.0+$/, "").replace(/(\.\d*?)0+$/, "$1");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, Number(value)));
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function persist() {
      saveCurrentText();
      localStorage.setItem("researchPlotterState", JSON.stringify(state.metrics));
    }

    function loadJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function pointerPos(event) {
      const rect = els.chart.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    els.metricNav.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-metric]");
      if (button) setActiveMetric(button.dataset.metric);
    });
    els.lineTab.addEventListener("click", () => setChartType("line"));
    els.barTab.addEventListener("click", () => setChartType("bar"));
    els.prpInput.addEventListener("input", updateAll);
    els.expInput.addEventListener("input", updateAll);
    els.loadExample.addEventListener("click", () => {
      const sample = makeSample(state.metric);
      els.prpInput.value = sample.prp;
      els.expInput.value = sample.exp;
      updateAll();
    });
    els.clearData.addEventListener("click", () => {
      els.prpInput.value = "";
      els.expInput.value = "";
      updateAll();
    });
    els.controls.addEventListener("input", (event) => {
      const input = event.target.closest("[data-path]");
      if (!input) return;
      updateControl(input.dataset.path, input.type === "checkbox" ? input.checked : input.value, input.dataset.type);
    });
    els.controls.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      if (action === "addAnnotation") addAnnotation();
      if (action === "clearAnnotations") clearAnnotations();
      if (action === "removeAnnotation") removeAnnotation(Number(button.dataset.index));
    });
    els.controls.addEventListener("change", (event) => {
      const input = event.target.closest("[data-path]");
      if (!input) return;
      updateControl(input.dataset.path, input.type === "checkbox" ? input.checked : input.value, input.dataset.type);
    });
    els.exportCsv.addEventListener("click", exportCsv);
    els.exportPng.addEventListener("click", exportPng);
    els.exportSvg.addEventListener("click", exportSvg);
    els.copySummary.addEventListener("click", () => copyText(getSummaryTsv(), els.copySummary, "已复制"));
    els.copyPValues.addEventListener("click", () => copyText(getPValueTsv(), els.copyPValues, "已复制"));
    els.saveEffect.addEventListener("click", saveEffect);
    els.resetEffect.addEventListener("click", resetEffect);
    els.lockLayout.addEventListener("click", () => setLayoutUnlocked(false));
    els.unlockLayout.addEventListener("click", () => setLayoutUnlocked(true));
    els.chart.addEventListener("pointerdown", (event) => {
      if (!state.unlocked) return;
      const point = pointerPos(event);
      const hit = [...state.handles].reverse().find((h) => point.x >= h.x && point.x <= h.x + h.width && point.y >= h.y && point.y <= h.y + h.height);
      if (!hit) return;
      state.drag = { type: hit.type, index: hit.index, start: point, style: clone(activeStyle()) };
      els.chart.setPointerCapture(event.pointerId);
    });
    els.chart.addEventListener("pointermove", (event) => {
      const point = pointerPos(event);
      if (state.drag && state.unlocked) {
        const style = activeStyle();
        const dx = point.x - state.drag.start.x;
        const dy = point.y - state.drag.start.y;
        const base = state.drag.style;
        const plot = makePlot(els.chart.clientWidth || 1100, els.chart.clientHeight || 560, style);
        if (state.drag.type === "title") {
          style.titleX = clamp(base.titleX + dx / plot.w * 100, 0, 100);
          style.titleY = clamp(base.titleY + dy, 0, 180);
        }
        if (state.drag.type === "xLabel") {
          style.xLabelX = clamp(base.xLabelX + dx / plot.w * 100, 0, 100);
          style.xLabelY = clamp(base.xLabelY - dy, 0, 160);
        }
        if (state.drag.type === "yLabel") {
          style.yLabelX = clamp(base.yLabelX + dx, 0, 220);
          style.yLabelY = clamp(base.yLabelY + dy / plot.h * 100, 0, 100);
        }
        if (state.drag.type === "legend") {
          style.legendX = clamp(base.legendX + dx, 0, 2200);
          style.legendY = clamp(base.legendY + dy, 0, 2200);
          style.legendPosition = "custom";
        }
        if (state.drag.type === "annotation") {
          const annotation = style.annotations?.[state.drag.index];
          const baseAnnotation = base.annotations?.[state.drag.index];
          if (annotation && baseAnnotation) {
            const baseX = plot.x(Number(baseAnnotation.x));
            const baseY = plot.y(Number(baseAnnotation.y));
            annotation.x = clamp(plot.xMin + ((baseX + dx - plot.left) / plot.w) * (plot.xMax - plot.xMin), plot.xMin, plot.xMax);
            annotation.y = clamp(plot.yMin + ((plot.top + plot.h - (baseY + dy)) / plot.h) * (plot.yMax - plot.yMin), plot.yMin, plot.yMax);
          }
        }
        renderControls();
        draw();
        persist();
        return;
      }
      const hit = state.hovers.find((h) => Math.hypot(h.x - point.x, h.y - point.y) <= h.radius);
      if (!hit) {
        els.tooltip.hidden = true;
        return;
      }
      els.tooltip.innerHTML = `<strong>${hit.group} · ${hit.time}</strong><br>均值：${formatNumber(hit.stats.mean)}<br>${activeStyle().errorType.toUpperCase()}：${formatNumber(hit.stats.error)}<br>n：${hit.stats.n}`;
      els.tooltip.style.left = hit.x + "px";
      els.tooltip.style.top = hit.y + "px";
      els.tooltip.hidden = false;
    });
    els.chart.addEventListener("pointerup", (event) => {
      state.drag = null;
      try { els.chart.releasePointerCapture(event.pointerId); } catch {}
      renderControls();
    });
    els.chart.addEventListener("pointercancel", () => state.drag = null);
    els.chart.addEventListener("mouseleave", () => {
      els.tooltip.hidden = true;
      state.drag = null;
    });
    window.addEventListener("resize", draw);

    loadCurrentText();
    renderMetricNav();
    renderChartTabs();
    renderControls();
    setLayoutUnlocked(false);
    updateAll();
  </script>
</body>
</html>
